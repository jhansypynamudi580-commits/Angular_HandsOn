<h2>Enrollment Request Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <label for="studentName">Student Name</label>
  <input
    type="text"
    id="studentName"
    name="studentName"
    [(ngModel)]="studentName"
    #nameCtrl="ngModel"
    required
    minlength="3">

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
    Name is required
  </span>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
    Name must be at least 3 characters
  </span>

  <label for="studentEmail">Email</label>
  <input
    type="email"
    id="studentEmail"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    #emailCtrl="ngModel"
    required
    email>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
    Email is required
  </span>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
    Invalid email
  </span>

  <label for="courseId">Course ID</label>
  <input
    type="number"
    id="courseId"
    name="courseId"
    [(ngModel)]="courseId"
    #courseCtrl="ngModel"
    required>

  <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
    Course ID is required
  </span>

  <label for="preferredSemester">Preferred Semester</label>
  <select
    id="preferredSemester"
    name="preferredSemester"
    [(ngModel)]="preferredSemester"
    #semesterCtrl="ngModel"
    required>

    <option value="">Select Semester</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>

  <div class="checkbox-group">
    <input
      type="checkbox"
      id="agreeToTerms"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      #termsCtrl="ngModel"
      required>

    <label for="agreeToTerms">Agree to Terms</label>
  </div>

  <span *ngIf="termsCtrl.touched && termsCtrl.invalid">
    Please accept Terms
  </span>

  <br><br>

  <button type="submit" [disabled]="enrollForm.invalid">
    Submit
  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm(); submitted = false">
    Reset
  </button>

</form>

<div *ngIf="submitted" class="success">
  Enrollment request submitted successfully!
</div>
