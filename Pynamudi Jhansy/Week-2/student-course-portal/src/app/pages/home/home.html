<h1>{{ portalName }}</h1>

<p>Welcome to the Student Course Portal.</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br><br>

<input
  type="text"
  placeholder="Search course"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>
<p>Available Courses: {{ availableCourses }}</p>
