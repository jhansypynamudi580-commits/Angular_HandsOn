<div class="form-box">

  <h2>Reactive Enrollment Form</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <div class="field">
      <label>Student Name</label>
      <input formControlName="studentName">
    </div>

    <div class="field">
      <label>Student Email</label>
      <input formControlName="studentEmail">
    </div>

    <div class="field">
      <label>Course ID</label>
      <input formControlName="courseId">
    </div>

    <div class="field">
      <label>Semester</label>
      <select formControlName="preferredSemester">
        <option>Odd</option>
        <option>Even</option>
      </select>
    </div>

    <!-- Checkbox FIX -->
    <div class="terms-box">
      <input type="checkbox" id="terms" formControlName="agreeToTerms">
      <label for="terms">I agree to terms</label>
    </div>

    <h4>Additional Courses</h4>

    <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="course-row">

      <input [formControl]="$any(ctrl)">
      <button type="button" (click)="removeCourse(i)">Remove</button>

    </div>

    <button type="button" (click)="addCourse()">Add Course</button>

    <br><br>

    <button type="submit" [disabled]="enrollForm.invalid">
      Submit
    </button>

  </form>

</div>
