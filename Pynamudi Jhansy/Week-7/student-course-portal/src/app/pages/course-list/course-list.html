<h2>Available Courses</h2>


<div class="search-box">

  <input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Search courses">

  <button (click)="searchCourses()">
    Search
  </button>

</div>


<p *ngIf="searchTerm">
  Searching for: {{ searchTerm }}
</p>



<div *ngFor="let course of courses">

  <app-course-card
    [course]="course">
  </app-course-card>

</div>
